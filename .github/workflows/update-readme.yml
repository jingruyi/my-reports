name: Auto-update folder READMEs

on:
  push:
    paths:
      - 'monthly-reports/**'  # 监听 monthly-reports 文件夹下的任何变动

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 workflow 写入仓库

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate README
        run: python monthly-reports/generate_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monthly-reports/README.md
          git diff --cached --quiet || git commit -m "Auto-update folder READMEs"
          git push
