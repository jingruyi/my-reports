<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 경쟁사 데이터 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* CN font: Microsoft YaHei (system font, no download needed) */
  body.lang-cn {
    font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", sans-serif !important;
  }
  body.lang-cn button, body.lang-cn input, body.lang-cn span, body.lang-cn div, body.lang-cn h1, body.lang-cn p {
    font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", sans-serif !important;
  }

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f5f7fa;
    --border: #dde2ea;
    --border2: #c5ccd8;
    --text: #111827;
    --text-dim: #374151;
    --text-muted: #6b7280;
    --heping: #c97a00;
    --wangzhe: #1d5fa8;
    --delta: #007a47;
    --wuwei: #a0201b;
    --accent: #c97a00;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }
  body::before { display: none; }
  .container {
    position: relative;
    z-index: 1;
    max-width: 1320px;
    margin: 0 auto;
    padding: 24px 24px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-left h1 {
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-left h1::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 20px;
    background: var(--heping);
    border-radius: 2px;
    box-shadow: none;
  }
  .header-left p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  /* ── LANG TOGGLE (fixed top-right, subtle) ── */
  .lang-toggle {
    position: fixed;
    top: 14px;
    right: 20px;
    z-index: 999;
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    backdrop-filter: blur(6px);
  }
  .lang-btn {
    padding: 3px 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    transition: all 0.18s;
    letter-spacing: 0.08em;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #ffffff;
  }
  .lang-btn:hover:not(.active) { color: var(--text); }

  /* ── CONTROL BAR (row 1: date filter) ── */
  .control-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .date-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .date-filter-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    min-width: 60px;
  }
  .date-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
    cursor: pointer;
    color-scheme: light;
  }
  .date-input:focus { border-color: var(--heping); }
  .date-sep { color: var(--text-muted); font-size: 13px; }
  .apply-btn {
    padding: 6px 18px;
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: #000;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .apply-btn:hover { opacity: 0.85; }
  .preset-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .preset-btn {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .preset-btn:hover { border-color: var(--heping); color: var(--heping); }
  .preset-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
    font-weight: 700;
  }

  /* ── CONTROL BAR ROW 2: metric + period ── */
  .metric-period-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .metric-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .metric-tab {
    padding: 7px 20px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 7px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }
  .metric-tab.active {
    background: var(--accent);
    color: #ffffff;
    font-weight: 700;
  }
  .metric-tab:hover:not(.active) { color: var(--text); }
  .period-group {
    display: flex;
    gap: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .period-btn {
    padding: 5px 15px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    transition: all 0.18s;
  }
  .period-btn.active {
    background: var(--accent);
    color: #ffffff;
    box-shadow: none;
  }
  .period-btn:hover:not(.active) { color: var(--text); background: var(--border); }

  /* ── STATS CARDS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .stat-card.highlighted { border-color: rgba(201,122,0,0.3); background: linear-gradient(135deg, #ffffff 0%, rgba(201,122,0,0.05) 100%); }
  .stat-game {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .stat-game-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stat-card.heping .stat-game { color: var(--heping); }
  .stat-card.heping .stat-game-dot { background: var(--heping); }
  .stat-card.wangzhe .stat-game { color: var(--wangzhe); }
  .stat-card.wangzhe .stat-game-dot { background: var(--wangzhe); }
  .stat-card.delta .stat-game { color: var(--delta); }
  .stat-card.delta .stat-game-dot { background: var(--delta); }
  .stat-card.wuwei .stat-game { color: var(--wuwei); }
  .stat-card.wuwei .stat-game-dot { background: var(--wuwei); }

  /* Main value row: big number + MoM badge side by side */
  .stat-main-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .stat-big-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .stat-mom-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
  }
  .stat-mom-badge.up      { color: #f04a5a; background: rgba(240,74,90,0.12); }
  .stat-mom-badge.down    { color: #4a90e2; background: rgba(74,144,226,0.12); }
  .stat-mom-badge.neutral { color: var(--text-muted); background: var(--border); }
  .stat-meta {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.03em;
  }
  .stat-peak {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-peak span { color: var(--accent); font-weight: 600; }

  /* Sub MoM row (week/month below) */
  .stat-sub-row {
    display: flex;
    gap: 14px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .stat-sub-cell { display: flex; flex-direction: column; gap: 2px; }
  .sub-label { font-size: 10px; color: var(--text-muted); }
  .sub-value {
    font-size: 13px;
    font-weight: 600;
  }
  .sub-value.up      { color: #f04a5a; }
  .sub-value.down    { color: #4a90e2; }
  .sub-value.neutral { color: var(--text-muted); }

  /* ── CHART CARD ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .chart-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--heping), transparent);
    opacity: 0.5;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .chart-title { font-size: 13px; color: var(--text-dim); letter-spacing: 0.06em; }
  .chart-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Legend */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    cursor: pointer; opacity: 1; transition: opacity 0.2s; user-select: none;
  }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-line { width: 20px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .legend-line.bold { height: 4px; }
  .legend-label { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .legend-item.heping .legend-label { color: var(--heping); font-weight: 700; }

  /* Chart wrapper */
  .chart-wrapper { position: relative; height: 360px; }

  /* Hover panel */
  .hover-panel {
    position: absolute; top: 0; right: 0;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    min-width: 200px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 50;
  }
  .hover-panel.visible { opacity: 1; }
  .hover-date { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); padding-bottom: 7px; }
  .hover-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 3px 0; }
  .hover-game { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .hover-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .hover-val { font-size: 12px; color: var(--text); font-weight: 500; }
  .hover-mom { font-size: 10px; padding: 1px 4px; border-radius: 3px; }
  .hover-mom.up { color: #f04a5a; }
  .hover-mom.down { color: #4a90e2; }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; align-items: flex-start; }
  }

  /* ── EVENTS SECTION ── */
  .events-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-top: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .events-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .events-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .events-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }
  .events-month-label {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }
  .events-game-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .evt-tab-btn {
    padding: 5px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .evt-tab-btn.active-hp { border-color: var(--heping);  color: var(--heping);  background: rgba(201,122,0,0.08);  font-weight:700; }
  .evt-tab-btn.active-wz { border-color: var(--wangzhe); color: var(--wangzhe); background: rgba(29,95,168,0.08);   font-weight:700; }
  .evt-tab-btn.active-df { border-color: var(--delta);   color: var(--delta);   background: rgba(0,122,71,0.08);    font-weight:700; }
  .evt-tab-btn.active-ww { border-color: var(--wuwei);   color: var(--wuwei);   background: rgba(160,32,27,0.08);   font-weight:700; }
  .events-summary {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 8px 12px;
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .events-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .events-table th {
    text-align: left;
    padding: 6px 10px;
    color: var(--text-muted);
    font-weight: 600;
    border-bottom: 1.5px solid var(--border);
    white-space: nowrap;
    font-size: 11px;
    letter-spacing: 0.04em;
  }
  .events-table td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border2);
    vertical-align: top;
    color: var(--text);
    line-height: 1.5;
  }
  .events-table tr:last-child td { border-bottom: none; }
  .events-table tr:hover td { background: var(--surface2); }
  .evt-date { white-space: nowrap; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .evt-link { color: var(--accent); text-decoration: none; font-size: 11px; white-space: nowrap; }
  .evt-link:hover { text-decoration: underline; }
  .no-events-msg { color: var(--text-muted); font-size: 12px; padding: 16px 0; text-align: center; }
  .ebadge { display:inline-block; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:700; white-space:nowrap; }
  .eb-version  { background:#dbeafe; color:#1d4ed8; }
  .eb-event    { background:#dcfce7; color:#15803d; }
  .eb-commerce { background:#fef3c7; color:#b45309; }
  .eb-other    { background:#f1f5f9; color:#475569; }
  .evt-panel { display:none; }
  .evt-panel.active { display:block; }

</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1 id="pageTitle">게임 경쟁사 데이터 대시보드</h1>
      <p id="headerSub">iOS · 2024.01.01 — 2026.04.15 · 출처：Sensor Tower</p>
    </div>

  </div>

  <!-- CONTROL BAR: Date filter -->
  <div class="control-bar">
    <div class="date-row">
      <span class="date-filter-label" id="labelDateRange">기간 설정</span>
      <input type="date" class="date-input" id="dateFrom" value="2026-01-01" min="2024-01-01" max="2026-04-21">
      <span class="date-sep">—</span>
      <input type="date" class="date-input" id="dateTo" value="2026-04-21" min="2024-01-01" max="2026-04-21">
      <button class="apply-btn" id="applyBtn" onclick="applyDate()">응용</button>
    </div>
    <div class="preset-row" id="presetRow">
      <button class="preset-btn" onclick="setPreset('2024-01-01','2024-12-31',0)">2024년</button>
      <button class="preset-btn" onclick="setPreset('2024-01-01','2024-03-31',1)">Q1'24</button>
      <button class="preset-btn" onclick="setPreset('2024-04-01','2024-06-30',2)">Q2'24</button>
      <button class="preset-btn" onclick="setPreset('2024-07-01','2024-09-30',3)">Q3'24</button>
      <button class="preset-btn" onclick="setPreset('2024-10-01','2024-12-31',4)">Q4'24</button>
      <button class="preset-btn" onclick="setPreset('2025-01-01','2025-12-31',5)">2025년</button>
      <button class="preset-btn" onclick="setPreset('2025-01-01','2025-03-31',6)">Q1'25</button>
      <button class="preset-btn" onclick="setPreset('2025-04-01','2025-06-30',7)">Q2'25</button>
      <button class="preset-btn" onclick="setPreset('2025-07-01','2025-09-30',8)">Q3'25</button>
      <button class="preset-btn" onclick="setPreset('2025-10-01','2025-12-31',9)">Q4'25</button>
      <button class="preset-btn" onclick="setPreset('2026-01-01','2026-04-21',10)" class="preset-btn active">2026년</button>
      <button class="preset-btn" onclick="setPreset('2026-01-01','2026-03-31',11)">Q1'26</button>
      <button class="preset-btn" onclick="setPreset('2024-01-01','2026-04-21',12)">전체</button>
    </div>
  </div>

  <!-- METRIC + PERIOD ROW -->
  <div class="metric-period-row">
    <div class="metric-tabs">
      <button class="metric-tab active" id="tabRank" onclick="setMetric('rank')">📱 iOS 순위</button>
      <button class="metric-tab" id="tabRevenue" onclick="setMetric('revenue')">💰 매출</button>
      <button class="metric-tab" id="tabDau" onclick="setMetric('dau')">👥 DAU</button>
    </div>
  </div>

  <!-- STATS CARDS -->
  <div class="stats-row" id="statsRow"></div>

  <!-- CHART CARD -->
  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title" id="chartTitle">iOS 최고 매출 순위</div>
        <div class="chart-subtitle" id="chartSubtitle">화평정영 · 왕자영요 · Delta Force · Valorant M</div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <div class="period-group">
          <button class="period-btn active" id="pbDay" onclick="setPeriod('day')">일</button>
          <button class="period-btn" id="pbWeek" onclick="setPeriod('week')">주</button>
          <button class="period-btn" id="pbMonth" onclick="setPeriod('month')">월</button>
          <button class="period-btn" id="pbYear" onclick="setPeriod('year')">연</button>
        </div>
      </div>
    </div>
    <div class="legend" id="legend" style="margin-bottom:14px;"></div>
    <div class="chart-wrapper" onmouseleave="hideHoverPanel()">
      <canvas id="mainChart"></canvas>
      <div class="hover-panel" id="hoverPanel">
        <div class="hover-date" id="hoverDate">—</div>
        <div id="hoverRows"></div>
      </div>
    </div>
  </div>

<div class="events-section" id="eventsSection" style="display:none;">
  <div class="events-header">
    <div class="events-title" id="evtSectionTitle">게임 동향</div>
    <div class="events-month-label" id="evtMonthLabel"></div>
  </div>
  <div class="events-game-tabs" id="evtGameTabs"></div>
  <div id="evtPanels"></div>
</div>

// ── 自动计算所有数据的最新日期 ──
const MAX_DATE = Object.values(RAW)
  .flatMap(metric => Object.values(metric).map(g => g.dates[g.dates.length - 1]))
  .sort().pop();

// ── 同步到输入框和预设按钮 ──
document.addEventListener('DOMContentLoaded', () => {
  const toEl = document.getElementById('dateTo');
  if (toEl) { toEl.value = MAX_DATE; toEl.max = MAX_DATE; }
  const fromEl = document.getElementById('dateFrom');
  if (fromEl) { fromEl.max = MAX_DATE; }
  // 更新"2026년"和"전체"预设按钮的结束日期
  document.querySelectorAll('.preset-btn').forEach(btn => {
    const m = btn.getAttribute('onclick');
    if (!m) return;
    if (m.includes("'2026-01-01'") && m.includes(',10)')) {
      btn.setAttribute('onclick', `setPreset('2026-01-01','${MAX_DATE}',10)`);
    }
    if (m.includes("'2024-01-01'") && m.includes(',12)')) {
      btn.setAttribute('onclick', `setPreset('2024-01-01','${MAX_DATE}',12)`);
    }
  });
});

let currentLang = 'kr';
let currentMetric = 'rank';
let currentPeriod = 'day';
let filterFrom = '2026-01-01';
let filterTo   = MAX_DATE;
let hiddenGames = new Set();
let chart = null;
let lastAgg = {};
let lastLabels = [];

// ── AGGREGATION ──────────────────────────────────────────────────────
function aggregateData(metric, period, from, to) {
  from = from || filterFrom; to = to || filterTo;
  const result = {};
  for (const g of GAMES) {
    const src = RAW[metric][g.key];
    if (!src) { result[g.key] = { dates: [], values: [] }; continue; }
    const fdates = [], fvals = [];
    for (let i = 0; i < src.dates.length; i++) {
      if (metric === 'rank' && src.values[i] === 0) continue;
      if (src.dates[i] < from || src.dates[i] > to) continue;
      fdates.push(src.dates[i]);
      fvals.push(src.values[i]);
    }
    if (period === 'day') { result[g.key] = { dates: fdates, values: fvals }; continue; }
    const groups = {};
    for (let i = 0; i < fdates.length; i++) {
      const key = getPeriodKey(fdates[i], period);
      if (!groups[key]) groups[key] = [];
      groups[key].push(fvals[i]);
    }
    const dates = Object.keys(groups).sort();
    const values = dates.map(k => {
      const arr = groups[k];
      const sum = arr.reduce((a,b)=>a+b,0);
      const avg = sum / arr.length;
      if (metric === 'rank') return Math.round(avg);
      if (metric === 'dau')  return Math.round(avg);
      return sum; // revenue: sum
    });
    result[g.key] = { dates, values };
  }
  return result;
}

function getISOWeek(d) {
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const dow = jan4.getDay() || 7;
  const weekStart = new Date(jan4);
  weekStart.setDate(jan4.getDate() - dow + 1);
  return Math.round((d - weekStart) / 604800000) + 1;
}

function getPeriodKey(dateStr, period) {
  const d = new Date(dateStr + 'T00:00:00');
  if (period === 'week') {
    // ISO Monday-based week: find Monday of this week
    const day = d.getDay() || 7; // Mon=1 ... Sun=7
    const mon = new Date(d);
    mon.setDate(d.getDate() - day + 1);
    return `${mon.getFullYear()}-W${String(getISOWeek(mon)).padStart(2,'0')}`;
  }
  if (period === 'month') return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if (period === 'year')  return `${d.getFullYear()}`;
  return dateStr;
}

// ── FORMAT ──────────────────────────────────────────────────────────
function formatVal(val, metric) {
  if (val === null || val === undefined) return '—';
  const t = I18N[currentLang];
  if (metric === 'rank') return `${Math.round(val)}${t.rankUnit}`;
  const p = METRIC_CONFIG[metric].prefix;
  if (val >= 1e6) return `${p}${(val/1e6).toFixed(2)}M`;
  if (val >= 1e3) return `${p}${(val/1e3).toFixed(1)}K`;
  return `${p}${val.toFixed(0)}`;
}

function formatAxisVal(val, metric) {
  if (metric === 'rank') return `${Math.round(val)}`;
  const p = METRIC_CONFIG[metric].prefix;
  if (val >= 1e6) return `${p}${(val/1e6).toFixed(1)}M`;
  if (val >= 1e3) return `${p}${(val/1e3).toFixed(0)}K`;
  return `${p}${val}`;
}

function formatMoM(curr, prev, metric) {
  if (prev === null || prev === undefined || curr === null) return null;
  const diff = curr - prev;
  if (diff === 0) return { text: '0.0%', pct: 0, cls: 'neutral' };
  const pct = Math.abs(diff / prev * 100).toFixed(1);
  const improved = metric === 'rank' ? diff < 0 : diff > 0;
  const sign = diff > 0 ? '▲' : '▼';
  return { text: `${sign}${pct}%`, cls: improved ? 'up' : 'down' };
}

function formatLabelDate(label) {
  if (currentPeriod === 'day') {
    const d = new Date(label + 'T00:00:00');
    return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
  }
  if (currentPeriod === 'week') return `주: ${label}`;
  if (currentPeriod === 'month') {
    const [y,m] = label.split('-');
    return currentLang === 'kr' ? `${y}년 ${parseInt(m)}월` : `${y}年${parseInt(m)}月`;
  }
  return currentLang === 'kr' ? `${label}년` : `${label}年`;
}

function formatPeriodLabel(dateKey, period) {
  // Returns human-readable period string for stat-meta
  if (!dateKey) return '—';
  if (period === 'day') {
    const d = new Date(dateKey + 'T00:00:00');
    return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
  }
  if (period === 'week') {
    const [yearStr, wStr] = dateKey.split('-W');
    const year = parseInt(yearStr), week = parseInt(wStr);
    const jan4 = new Date(year, 0, 4);
    const dow = jan4.getDay() || 7;
    const mon = new Date(jan4);
    mon.setDate(jan4.getDate() - dow + 1 + (week - 1) * 7);
    const sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    const fmt = d => `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
    return `${fmt(mon)}-${fmt(sun)}`;
  }
  if (period === 'month') {
    const [y, m] = dateKey.split('-');
    return currentLang === 'kr' ? `${y}년 ${parseInt(m)}월` : `${y}年${parseInt(m)}月`;
  }
  if (period === 'year') {
    return currentLang === 'kr' ? `${dateKey}년` : `${dateKey}年`;
  }
  return dateKey;
}

function findPeak(values, metric) {
  const nonNull = values.map((v,i)=>({v,i})).filter(x=>x.v !== null && x.v !== undefined);
  if (!nonNull.length) return -1;
  return metric === 'rank'
    ? nonNull.reduce((b,c)=>c.v<b.v?c:b).i
    : nonNull.reduce((b,c)=>c.v>b.v?c:b).i;
}

// ── STATS CARDS (日/周/月 MoM columns) ──────────────────────────────
function buildStats() {
  const t = I18N[currentLang];
  const container = document.getElementById('statsRow');
  const clsMap = {
    '和平精英': 'stat-card highlighted heping',
    '王者荣耀': 'stat-card wangzhe',
    '三角洲行动': 'stat-card delta',
    '无畏契约：源能行动': 'stat-card wuwei',
  };

  // Primary agg = current period; sub rows = the other two smaller periods
  const aggPrimary = aggregateData(currentMetric, currentPeriod);

  // Sub periods: always show the two periods smaller than current (day<week<month<year)
  const periodOrder = ['day', 'week', 'month', 'year'];
  const curIdx = periodOrder.indexOf(currentPeriod);
  // Sub = next two smaller periods, or same if already smallest
  const subPeriods = curIdx === 0
    ? ['week', 'month']
    : curIdx === 1
      ? ['day', 'month']
      : curIdx === 2
        ? ['day', 'week']
        : ['day', 'week']; // year: show day + week

  const aggSub0 = aggregateData(currentMetric, subPeriods[0]);
  const aggSub1 = aggregateData(currentMetric, subPeriods[1]);

  function getLatest(agg, gkey) {
    const d = agg[gkey];
    if (!d || !d.values.length) return { val: null, mom: null, date: null };
    const n = d.values.length;
    return {
      val:  d.values[n-1],
      mom:  formatMoM(d.values[n-1], n>=2 ? d.values[n-2] : null, currentMetric),
      date: d.dates[n-1],
    };
  }

  const periodLabelMap = { day: t.pbDay, week: t.pbWeek, month: t.pbMonth, year: t.pbYear };
  const metricLabel = { rank: t.tabRank, revenue: t.tabRevenue, dau: t.tabDau }[currentMetric];
  const subLabel0 = periodLabelMap[subPeriods[0]];
  const subLabel1 = periodLabelMap[subPeriods[1]];

  // Peak always based on day granularity
  const aggDay = currentPeriod === 'day' ? aggPrimary : aggregateData(currentMetric, 'day');

  container.innerHTML = GAMES.map(g => {
    const cls = clsMap[g.key] || 'stat-card';
    const primary = getLatest(aggPrimary, g.key);
    const sub0    = getLatest(aggSub0,    g.key);
    const sub1    = getLatest(aggSub1,    g.key);

    const momBadge = primary.mom
      ? `<span class="stat-mom-badge ${primary.mom.cls}">${primary.mom.text}</span>` : '';

    // Peak: for revenue+dau use current period aggregation; for rank use day granularity
    const peakSource = ((currentMetric === 'revenue' || currentMetric === 'dau') && currentPeriod !== 'day')
      ? (aggPrimary[g.key] || { values: [], dates: [] })
      : (aggDay[g.key]     || { values: [], dates: [] });
    const peakIdx  = findPeak(peakSource.values, currentMetric);
    const peakVal  = peakIdx >= 0 ? peakSource.values[peakIdx] : null;
    const peakDate = peakIdx >= 0 ? peakSource.dates[peakIdx]  : null;
    // format peak date always as day
    const peakStr = peakDate
      ? (() => {
          // If peakSource is aggPrimary (non-day), peakDate is already the period key
          // If peakSource is aggDay, peakDate is YYYY-MM-DD and needs conversion
          const isAlreadyPeriodKey = (currentMetric === 'revenue' || currentMetric === 'dau') && currentPeriod !== 'day';
          const periodKey = isAlreadyPeriodKey ? peakDate : getPeriodKey(peakDate, currentPeriod);
          return formatPeriodLabel(periodKey, currentPeriod);
        })()
      : '—';
    const peakHtml = peakVal !== null
      ? `<div class="stat-peak">⭐ <span>${formatVal(peakVal, currentMetric)}</span> · ${peakStr}</div>` : '';

    function subCell(periodKey, item) {
      const c = item.mom ? item.mom.cls : 'neutral';
      const txt = item.mom ? item.mom.text : '—';
      const lbl = t.momLabels[periodKey] || periodKey;
      return `<div class="stat-sub-cell">
        <div class="sub-label">${lbl}</div>
        <div class="sub-value ${c}">${txt}</div>
      </div>`;
    }

    const curPeriodLabel = periodLabelMap[currentPeriod];
    const baseMetricName = metricLabel.replace(/[📱💰👥]/g,'').trim();
    // For DAU in week/month/year: show "A.DAU" (average)
    const metricName = (currentMetric === 'dau' && currentPeriod !== 'day')
      ? baseMetricName.replace('DAU', 'A.DAU')
      : baseMetricName;

    return `<div class="${cls}">
      <div class="stat-game"><div class="stat-game-dot"></div>${g.label}</div>
      <div class="stat-main-row">
        <div class="stat-big-value">${primary.val !== null ? formatVal(primary.val, currentMetric) : '—'}</div>
        ${momBadge}
      </div>
      <div class="stat-meta">${formatPeriodLabel(primary.date, currentPeriod)} · ${metricName}</div>
      ${peakHtml}
      <div class="stat-sub-row">
        ${subCell(subPeriods[0], sub0)}
        ${subCell(subPeriods[1], sub1)}
      </div>
    </div>`;
  }).join('');
}

// ── PEAK PLUGIN ──────────────────────────────────────────────────────
const peakPlugin = {
  id: 'peakPlugin',
  afterDraw(chart) {
    const { ctx, scales: { x, y }, data } = chart;
    data.datasets.forEach(ds => {
      if (ds.hidden) return;
      const pi = ds._peakIdx;
      if (pi < 0 || pi === undefined) return;
      const val = ds.data[pi];
      if (val === null || val === undefined) return;
      const xPos = x.getPixelForValue(pi);
      const yPos = y.getPixelForValue(val);
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = ds.borderColor + 'aa';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(xPos, y.top);
      ctx.lineTo(xPos, yPos);
      ctx.stroke();
      ctx.setLineDash([]);
      const cx = xPos, cy = yPos;
      const outerR = 10, innerR = 4, spikes = 5;
      ctx.beginPath();
      for (let s = 0; s < spikes * 2; s++) {
        const angle = (s * Math.PI / spikes) - Math.PI / 2;
        const r = s % 2 === 0 ? outerR : innerR;
        ctx.lineTo(cx + Math.cos(angle)*r, cy + Math.sin(angle)*r);
      }
      ctx.closePath();
      ctx.shadowColor = 'rgba(0,0,0,0.25)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = ds.borderColor;
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'round';
      ctx.stroke();
      ctx.restore();
    });
  }
};
Chart.register(peakPlugin);

// ── CHART ────────────────────────────────────────────────────────────
function buildChart() {
  const agg = aggregateData(currentMetric, currentPeriod);
  lastAgg = agg;
  const allDates = [...new Set(GAMES.flatMap(g => agg[g.key]?.dates || []))].sort();
  lastLabels = allDates;

  const datasets = GAMES.map(g => {
    const gdata = agg[g.key] || { dates: [], values: [] };
    const dateMap = {};
    gdata.dates.forEach((d,i) => dateMap[d] = gdata.values[i]);
    const vals = allDates.map(d => dateMap[d] !== undefined ? dateMap[d] : null);
    const peakIdx = findPeak(vals, currentMetric);
    return {
      label: g.label,
      data: vals,
      borderColor: g.color,
      backgroundColor: 'transparent',
      borderWidth: g.bold ? 3.5 : 1.8,
      pointRadius: 0,
      pointHoverRadius: g.bold ? 7 : 5,
      pointHoverBackgroundColor: g.color,
      pointHoverBorderColor: '#ffffff',
      pointHoverBorderWidth: 2,
      tension: 0.35,
      fill: false,
      spanGaps: true,
      hidden: hiddenGames.has(g.key),
      order: g.bold ? 0 : 1,
      _peakIdx: peakIdx,
    };
  });

  const canvas = document.getElementById('mainChart');
  if (chart) chart.destroy();
  chart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels: allDates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 350 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      onHover: (evt, elements) => {
        if (!elements.length) { hideHoverPanel(); return; }
        showHoverPanel(elements[0].index);
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.07)', drawTicks: false },
          border: { display: false },
          ticks: {
            color: '#6b7280',
            font: { family: 'Noto Sans KR', size: 10 },
            maxTicksLimit: 18,
            maxRotation: 0,
            autoSkip: true,
            callback(val, i) {
              const label = this.getLabelForValue(val);
              if (!label) return '';
              if (currentPeriod === 'month') {
                const [y,m] = label.split('-');
                return `${y}.${parseInt(m)}`;
              }
              if (currentPeriod === 'year') {
                return `${label}`;
              }
              if (currentPeriod === 'week') {
                const [yearStr, wStr] = label.split('-W');
                const year = parseInt(yearStr), week = parseInt(wStr);
                const jan4 = new Date(year, 0, 4);
                const dow = jan4.getDay() || 7;
                const mon = new Date(jan4);
                mon.setDate(jan4.getDate() - dow + 1 + (week-1)*7);
                const sun = new Date(mon);
                sun.setDate(mon.getDate() + 6);
                return `${sun.getFullYear()}.${sun.getMonth()+1}.${sun.getDate()}`;
              }
              // day: YYYY.M.D
              const parts = label.split('-');
              return `${parts[0]}.${parseInt(parts[1])}.${parseInt(parts[2])}`;
            }
          }
        },
        y: {
          reverse: METRIC_CONFIG[currentMetric].invert,
          grid: { color: 'rgba(0,0,0,0.07)', drawTicks: false },
          border: { display: false },
          ticks: {
            color: '#6b7280',
            font: { family: 'Noto Sans KR', size: 10 },
            maxTicksLimit: 8,
            callback(v) { return formatAxisVal(v, currentMetric); }
          }
        }
      }
    }
  });
}

// ── HOVER PANEL ──────────────────────────────────────────────────────
function showHoverPanel(idx) {
  const label = lastLabels[idx];
  if (!label) return;
  document.getElementById('hoverDate').textContent = formatLabelDate(label);
  const rows = GAMES.map(g => {
    if (hiddenGames.has(g.key)) return '';
    const agg = lastAgg[g.key];
    const dateMap = {};
    agg.dates.forEach((d,i) => dateMap[d] = agg.values[i]);
    const curr = dateMap[label];
    const prev = lastLabels[idx-1] ? dateMap[lastLabels[idx-1]] : undefined;
    if (curr === undefined || curr === null) return '';
    const mom = formatMoM(curr, prev, currentMetric);
    const momHtml = mom ? `<span class="hover-mom ${mom.cls}">${mom.text}</span>` : '';
    return `<div class="hover-row">
      <div class="hover-game"><div class="hover-dot" style="background:${g.color}"></div><span>${g.label}</span></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="hover-val">${formatVal(curr, currentMetric)}</span>${momHtml}
      </div>
    </div>`;
  }).join('');
  document.getElementById('hoverRows').innerHTML = rows;
  document.getElementById('hoverPanel').classList.add('visible');
}
function hideHoverPanel() {
  document.getElementById('hoverPanel').classList.remove('visible');
}
// Hide panel when mouse leaves the entire chart card
document.addEventListener('DOMContentLoaded', () => {
  const card = document.querySelector('.chart-card');
  if (card) card.addEventListener('mouseleave', hideHoverPanel);
});

// ── LEGEND ───────────────────────────────────────────────────────────
function buildLegend() {
  document.getElementById('legend').innerHTML = GAMES.map(g => {
    const isH = g.key === '和平精英';
    const dimmed = hiddenGames.has(g.key) ? ' dimmed' : '';
    return `<div class="legend-item${isH?' heping':''}${dimmed}" onclick="toggleGame('${g.key}')">
      <div class="legend-line${isH?' bold':''}" style="background:${g.color}"></div>
      <span class="legend-label">${g.label}</span>
    </div>`;
  }).join('');
}

// ── CONTROLS ─────────────────────────────────────────────────────────
function applyDate() {
  filterFrom = document.getElementById('dateFrom').value;
  filterTo   = document.getElementById('dateTo').value;
  if (filterFrom > filterTo) return;
  updateHeaderSub();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  refresh();
}

function setPreset(from, to, idx) {
  filterFrom = from; filterTo = to;
  document.getElementById('dateFrom').value = from;
  document.getElementById('dateTo').value = to;
  document.querySelectorAll('.preset-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
  updateHeaderSub();
  refresh();
}

function setMetric(m) {
  currentMetric = m;
  const t = I18N[currentLang];
  document.querySelectorAll('.metric-tab').forEach(b => b.classList.remove('active'));
  document.getElementById({rank:'tabRank',revenue:'tabRevenue',dau:'tabDau'}[m]).classList.add('active');
  document.getElementById('chartTitle').textContent = t.chartTitles[m];
  refresh();
}

function setPeriod(p) {
  currentPeriod = p;
  ['day','week','month','year'].forEach((v,i) => {
    document.getElementById(['pbDay','pbWeek','pbMonth','pbYear'][i]).classList.toggle('active', v===p);
  });
  refresh();
}

function toggleGame(key) {
  if (hiddenGames.has(key)) hiddenGames.delete(key); else hiddenGames.add(key);
  buildLegend(); buildChart();
}

function updateHeaderSub() {
  const t = I18N[currentLang];
  const f = filterFrom.replace(/-/g,'.'), to = filterTo.replace(/-/g,'.');
  document.getElementById('headerSub').textContent = `iOS · ${f} — ${to} · ${t.source}`;
}

// ── LANG SWITCH ──────────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  const t = I18N[lang];
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent===lang.toUpperCase()));
  document.getElementById('pageTitle').textContent = t.title;
  document.title = t.title;
  document.getElementById('applyBtn').textContent = t.applyBtn;
  document.getElementById('labelDateRange').textContent = t.dateLabel;
  document.getElementById('tabRank').textContent = t.tabRank;

const EVT_BADGE = {
  version:  { kr:'버전 업데이트', cn:'版本更新', cls:'eb-version'  },
  event:    { kr:'이벤트 업데이트', cn:'活动更新', cls:'eb-event'   },
  commerce: { kr:'상업화',        cn:'商业化',   cls:'eb-commerce' },
  other:    { kr:'핫픽스/기타',   cn:'热更新/其他', cls:'eb-other' },
};
const EVT_GAME_ACTIVE = { wz:'active-wz', hp:'active-hp', df:'active-df', ww:'active-ww' };

// UI strings
const EVT_UI = {
  kr: { title:'게임 동향', date:'날짜', type:'유형', content:'내용', source:'출처', nodata:'이달 상세 업데이트 없음' },
  cn: { title:'游戏动态',  date:'日期', type:'类型', content:'内容', source:'来源', nodata:'本月暂无详细事件记录' },
};

let _evtCurrentMonthKeys = [];

// ── 获取所有与筛选区间重叠的月份（支持多月） ──
function getMatchingMonthKeys(from, to) {
  return Object.keys(EVENTS_DB).sort().filter(key => {
    const monthStart = key + '-01';
    const [y, m] = key.split('-').map(Number);
    const monthEnd = new Date(y, m, 0).toISOString().slice(0, 10);
    return from <= monthEnd && to >= monthStart;
  });
}

// ── 渲染单个月份的游戏面板内容 ──
function buildMonthContent(monthKey, lang, ui, monthIdx) {
  const entry = EVENTS_DB[monthKey];
  const wrap = document.createElement('div');
  wrap.className = 'evt-month-block';
  wrap.id = 'evtmonth_' + monthIdx;

  // 游戏tab行
  const tabsEl = document.createElement('div');
  tabsEl.className = 'events-game-tabs';
  const panelsEl = document.createElement('div');

  Object.entries(entry.games).forEach(([gameKey, gdata], i) => {
    const activeClass = EVT_GAME_ACTIVE[gdata.key] || 'active-hp';
    const pid = 'evtp_' + monthIdx + '_' + i;
    const gameName = gdata['name_' + lang] || gdata.name_kr;

    const btn = document.createElement('button');
    btn.className = 'evt-tab-btn' + (i === 0 ? ' ' + activeClass : '');
    btn.textContent = gameName;
    btn.onclick = () => {
      tabsEl.querySelectorAll('.evt-tab-btn').forEach(b =>
        Object.values(EVT_GAME_ACTIVE).forEach(c => b.classList.remove(c))
      );
      btn.classList.add(activeClass);
      panelsEl.querySelectorAll('.evt-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(pid).classList.add('active');
    };
    tabsEl.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'evt-panel' + (i === 0 ? ' active' : '');
    panel.id = pid;

    const sumDiv = document.createElement('div');
    sumDiv.className = 'events-summary';
    sumDiv.innerHTML = '📊 ' + (gdata['summary_' + lang] || gdata.summary_kr || '—');
    panel.appendChild(sumDiv);

    if (!gdata.events || gdata.events.length === 0) {
      const msg = document.createElement('div');
      msg.className = 'no-events-msg';
      msg.textContent = ui.nodata;
      panel.appendChild(msg);
    } else {
      const tbl = document.createElement('table');
      tbl.className = 'events-table';
      tbl.innerHTML = '<thead><tr><th>' + ui.date + '</th><th>' + ui.type + '</th><th>' + ui.content + '</th><th>' + ui.source + '</th></tr></thead>';
      const tbody = document.createElement('tbody');
      gdata.events.forEach(ev => {
        const badge = EVT_BADGE[ev.type] || EVT_BADGE.other;
        const lbl   = ev['label_' + lang] || ev.label_kr || badge[lang] || badge.kr;
        const cont  = ev['content_' + lang] || ev.content_kr || '';
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="evt-date">' + ev.date + '</td>' +
          '<td><span class="ebadge ' + badge.cls + '">' + lbl + '</span></td>' +
          '<td>' + cont + '</td>' +
          '<td>' + (ev.url ? '<a class="evt-link" href="' + ev.url + '" target="_blank">Link ↗</a>' : '—') + '</td>';
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      panel.appendChild(tbl);
    }
    panelsEl.appendChild(panel);
  });

  wrap.appendChild(tabsEl);
  wrap.appendChild(panelsEl);
  return wrap;
}

// ── 主渲染函数：支持多个月份 ──
function renderEventsSection(monthKeys) {
  const sec = document.getElementById('eventsSection');
  if (!monthKeys || monthKeys.length === 0) {
    sec.style.display = 'none';
    _evtCurrentMonthKeys = [];
    return;
  }

  _evtCurrentMonthKeys = monthKeys;
  const lang = typeof currentLang !== 'undefined' ? currentLang : 'kr';
  const ui   = EVT_UI[lang] || EVT_UI.kr;

  document.getElementById('evtSectionTitle').textContent = ui.title;
  document.getElementById('evtMonthLabel').textContent = '';
  sec.style.display = '';

  const tabsEl   = document.getElementById('evtGameTabs');
  const panelsEl = document.getElementById('evtPanels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';

  if (monthKeys.length === 1) {
    // 单月：直接显示，右上角标注月份
    const entry = EVENTS_DB[monthKeys[0]];
    document.getElementById('evtMonthLabel').textContent = entry['label_' + lang] || entry.label_kr;
    panelsEl.appendChild(buildMonthContent(monthKeys[0], lang, ui, 0));
    // 把游戏tab提升到tabsEl
    const inner = panelsEl.querySelector('.events-game-tabs');
    if (inner) { tabsEl.appendChild(inner); }
  } else {
    // 多月：用月份Tab切换
    document.getElementById('evtMonthLabel').textContent =
      (EVENTS_DB[monthKeys[0]]['label_' + lang] || EVENTS_DB[monthKeys[0]].label_kr) +
      ' – ' +
      (EVENTS_DB[monthKeys[monthKeys.length-1]]['label_' + lang] || EVENTS_DB[monthKeys[monthKeys.length-1]].label_kr);

    monthKeys.forEach((key, idx) => {
      const entry = EVENTS_DB[key];
      const mlabel = entry['label_' + lang] || entry.label_kr;

      const btn = document.createElement('button');
      btn.className = 'evt-tab-btn evt-month-tab' + (idx === 0 ? ' active-month' : '');
      btn.style.cssText = 'border-color:#666;color:#444;font-weight:600;';
      if (idx === 0) btn.style.cssText = 'border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb,80,120,200),0.08);font-weight:700;';
      btn.textContent = mlabel;
      btn.onclick = () => {
        tabsEl.querySelectorAll('.evt-month-tab').forEach(b => {
          b.style.cssText = 'border-color:#666;color:#444;font-weight:600;';
        });
        btn.style.cssText = 'border-color:var(--accent);color:var(--accent);background:rgba(80,120,200,0.08);font-weight:700;';
        panelsEl.querySelectorAll('.evt-month-block').forEach(p => p.style.display = 'none');
        document.getElementById('evtmonth_' + idx).style.display = '';
      };
      tabsEl.appendChild(btn);

      const block = buildMonthContent(key, lang, ui, idx);
      if (idx !== 0) block.style.display = 'none';
      panelsEl.appendChild(block);
    });
  }
}

// ── 语言切换时刷新 ──
function refreshEventsLang() {
  if (_evtCurrentMonthKeys.length > 0) renderEventsSection(_evtCurrentMonthKeys);
}

function updateEventsSection() {
  const from = filterFrom || document.getElementById('dateFrom').value;
  const to   = filterTo   || document.getElementById('dateTo').value;
  const keys = getMatchingMonthKeys(from, to);
  renderEventsSection(keys);
}

// Wrap filter functions
const _origApplyDate = applyDate;
applyDate = function() { _origApplyDate(); updateEventsSection(); };

const _origSetPreset = setPreset;
setPreset = function(from, to, idx) { _origSetPreset(from, to, idx); updateEventsSection(); };

// Wrap setLang to refresh events
const _origSetLang = setLang;
setLang = function(lang) { _origSetLang(lang); refreshEventsLang(); };

// Initial render
updateEventsSection();
</script>
