<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 경쟁사 데이터 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161c2b;
    --border: #1e2840;
    --border2: #252f4a;
    --text: #e8eaf0;
    --text-dim: #6b7a9a;
    --text-muted: #3d4d6a;
    --heping: #F5A623;
    --wangzhe: #4A90E2;
    --delta: #00C07A;
    --wuwei: #C0392B;
    --accent: #F5A623;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* Disable slashed zero in monospace font */
  .dm-mono, canvas {
    font-variant-numeric: normal;
    font-feature-settings: "zero" 0;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 1320px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left h1 {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-left h1::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 22px;
    background: var(--heping);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--heping);
  }
  .header-left p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 5px;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.05em;
  }
  .metric-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .metric-tab {
    padding: 8px 22px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 7px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }
  .metric-tab.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--border2);
  }
  .metric-tab:hover:not(.active) { color: var(--text); }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .stat-card.highlighted { border-color: rgba(245,166,35,0.3); background: linear-gradient(135deg, var(--surface) 0%, rgba(245,166,35,0.04) 100%); }
  .stat-card:hover { border-color: var(--border2); }
  .stat-game {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 5px;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-game::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .stat-card.heping .stat-game { color: var(--heping); }
  .stat-card.heping .stat-game::before { background: var(--heping); box-shadow: 0 0 6px var(--heping); }
  .stat-card.wangzhe .stat-game { color: var(--wangzhe); }
  .stat-card.wangzhe .stat-game::before { background: var(--wangzhe); }
  .stat-card.delta .stat-game { color: var(--delta); }
  .stat-card.delta .stat-game::before { background: var(--delta); }
  .stat-card.wuwei .stat-game { color: var(--wuwei); }
  .stat-card.wuwei .stat-game::before { background: var(--wuwei); }

  .stat-main { display: flex; align-items: baseline; gap: 10px; margin-bottom: 3px; }
  .stat-value {
    font-size: 20px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }
  .stat-mom {
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    padding: 1px 5px;
    border-radius: 4px;
  }
  .stat-mom.up { color: #f04a5a; background: rgba(240,74,90,0.1); }
  .stat-mom.down { color: #4a90e2; background: rgba(74,144,226,0.1); }
  .stat-mom.neutral { color: var(--text-muted); background: var(--border); }
  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .stat-peak {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .stat-peak span { color: var(--accent); }

  /* CHART CARD */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
  }
  .chart-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--heping), transparent);
    opacity: 0.4;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .chart-title { font-size: 13px; color: var(--text-dim); font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.08em; }
  .chart-subtitle { font-size: 11px; color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; margin-top: 3px; }

  /* DATE RANGE FILTER */
  .date-filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .date-filter-label { font-size: 11px; color: var(--text-dim); font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.05em; white-space: nowrap; }
  .date-input {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    outline: none;
    font-feature-settings: 'zero' 0;
    transition: border-color 0.2s;
    cursor: pointer;
    color-scheme: dark;
  }
  .date-input:focus { border-color: var(--heping); }
  .date-sep { color: var(--text-muted); font-size: 12px; }
  .date-presets { display: flex; gap: 4px; flex-wrap: wrap; }
  .preset-btn {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .preset-btn:hover, .preset-btn.active { border-color: var(--heping); color: var(--heping); background: rgba(245,166,35,0.06); }

  /* CONTROLS ROW */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .period-group {
    display: flex;
    gap: 3px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .period-btn {
    padding: 5px 15px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    transition: all 0.18s;
    letter-spacing: 0.05em;
  }
  .period-btn.active { background: var(--accent); color: #000; }
  .period-btn:hover:not(.active) { color: var(--text); background: var(--border); }

  /* LEGEND */
  .legend { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    opacity: 1;
    transition: opacity 0.2s;
    user-select: none;
  }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-line {
    width: 22px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .legend-line.bold { height: 4px; }
  .legend-label { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .legend-item.heping .legend-label { color: var(--heping); font-weight: 700; }

  /* CHART WRAPPER */
  .chart-wrapper { position: relative; height: 390px; }

  /* HOVER INFO PANEL */
  .hover-panel {
    position: absolute;
    top: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 14px;
    min-width: 200px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 50;
  }
  .hover-panel.visible { opacity: 1; }
  .hover-date { font-size: 11px; color: var(--text-dim); font-family: 'Noto Sans KR', sans-serif; margin-bottom: 8px; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); padding-bottom: 7px; }
  .hover-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 3px 0; }
  .hover-game { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .hover-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .hover-val { font-size: 12px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); font-weight: 500; }
  .hover-mom { font-size: 10px; font-family: 'Noto Sans KR', sans-serif; padding: 1px 4px; border-radius: 3px; }
  .hover-mom.up { color: #f04a5a; }
  .hover-mom.down { color: #4a90e2; }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; }
    .metric-tabs { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>게임 경쟁사 데이터 대시보드</h1>
      <p id="headerSub">iOS · 2024.01.01 — 2026.04.15 · 출처：Sensor Tower</p>
    </div>
    <div class="metric-tabs">
      <button class="metric-tab active" onclick="setMetric('rank')">📱 iOS 순위</button>
      <button class="metric-tab" onclick="setMetric('revenue')">💰 매출</button>
      <button class="metric-tab" onclick="setMetric('dau')">👥 DAU</button>
    </div>
  </div>

  <!-- STATS CARDS -->
  <div class="stats-row" id="statsRow"></div>

  <!-- CHART CARD -->
  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title" id="chartTitle">iOS 최고 매출 순위</div>
        <div class="chart-subtitle" id="chartSubtitle">화평정영 · 왕자영요 · Delta Force · Valorant M</div>
      </div>

      <!-- DATE FILTER -->
      <div class="date-filter-row">
        <span class="date-filter-label">기간 설정</span>
        <input type="date" class="date-input" id="dateFrom" value="2024-01-01" min="2024-01-01" max="2026-04-15" onchange="onDateChange()">
        <span class="date-sep">—</span>
        <input type="date" class="date-input" id="dateTo" value="2026-04-15" min="2024-01-01" max="2026-04-15" onchange="onDateChange()">
        <div class="date-presets">
          <button class="preset-btn" onclick="setPreset('2024-01-01','2024-12-31','2024년')">2024년</button>
          <button class="preset-btn" onclick="setPreset('2024-01-01','2024-03-31','Q1 2024')">Q1'24</button>
          <button class="preset-btn" onclick="setPreset('2024-04-01','2024-06-30','Q2 2024')">Q2'24</button>
          <button class="preset-btn" onclick="setPreset('2024-07-01','2024-09-30','Q3 2024')">Q3'24</button>
          <button class="preset-btn" onclick="setPreset('2024-10-01','2024-12-31','Q4 2024')">Q4'24</button>
          <button class="preset-btn" onclick="setPreset('2025-01-01','2025-12-31','2025년')">2025년</button>
          <button class="preset-btn" onclick="setPreset('2025-01-01','2025-03-31','Q1 2025')">Q1'25</button>
          <button class="preset-btn" onclick="setPreset('2025-04-01','2025-06-30','Q2 2025')">Q2'25</button>
          <button class="preset-btn" onclick="setPreset('2025-07-01','2025-09-30','Q3 2025')">Q3'25</button>
          <button class="preset-btn" onclick="setPreset('2025-10-01','2025-12-31','Q4 2025')">Q4'25</button>
          <button class="preset-btn" onclick="setPreset('2026-01-01','2026-04-15','2026년')">2026년</button>
          <button class="preset-btn" onclick="setPreset('2026-01-01','2026-03-31','Q1 2026')">Q1'26</button>
          <button class="preset-btn active" onclick="setPreset('2024-01-01','2026-04-15','전체')">전체</button>
        </div>
      </div>
    </div>

    <!-- CONTROLS: PERIOD + LEGEND -->
    <div class="controls">
      <div class="period-group">
        <button class="period-btn active" onclick="setPeriod('day')">일</button>
        <button class="period-btn" onclick="setPeriod('week')">주</button>
        <button class="period-btn" onclick="setPeriod('month')">월</button>
        <button class="period-btn" onclick="setPeriod('year')">연</button>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <!-- CHART -->
    <div class="chart-wrapper">
      <canvas id="mainChart"></canvas>
      <div class="hover-panel" id="hoverPanel">
        <div class="hover-date" id="hoverDate">—</div>
        <div id="hoverRows"></div>
      </div>
    </div>
  </div>

</div>

const GAMES = [

];

const METRIC_CONFIG = {
  rank:    { title: 'iOS 최고 매출 순위 (숫자가 작을수록 순위 높음)', invert: true,  prefix: '',  isRank: true  },
  revenue: { title: 'iOS 매출',                         invert: false, prefix: '$', isRank: false },
  dau:     { title: 'iOS DAU (일간 활성 이용자)',                invert: false, prefix: '',  isRank: false },
};

let currentMetric = 'rank';
let currentPeriod = 'day';
let filterFrom = '2024-01-01';
let filterTo   = '2026-04-15';
let chart = null;
let hiddenGames = new Set();

// Last hovered index per game for MoM (stores {index, dateIndex} into aggregated data)
let lastAgg = {};   // key -> {dates, values}
let lastLabels = [];
let hoverIdx = -1;

// ===== AGGREGATION =====
function aggregateData(metric, period) {
  const result = {};
  for (const g of GAMES) {
    const src = RAW[metric][g.key];
    if (!src) { result[g.key] = { dates: [], values: [] }; continue; }

    // Filter by date range
    const fdates = [], fvals = [];
    for (let i = 0; i < src.dates.length; i++) {
      if (metric === 'rank' && src.values[i] === 0) continue;
      if (src.dates[i] < filterFrom || src.dates[i] > filterTo) continue;
      fdates.push(src.dates[i]);
      fvals.push(src.values[i]);
    }

    if (period === 'day') {
      result[g.key] = { dates: fdates, values: fvals };
    } else {
      const groups = {};
      for (let i = 0; i < fdates.length; i++) {
        const key = getPeriodKey(fdates[i], period);
        if (!groups[key]) groups[key] = [];
        groups[key].push(fvals[i]);
      }
      const dates = Object.keys(groups).sort();
      const values = dates.map(k => {
        const arr = groups[k];
        if (metric === 'rank') return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
        return arr.reduce((a,b)=>a+b,0);
      });
      result[g.key] = { dates, values };
    }
  }
  return result;
}

function getPeriodKey(dateStr, period) {
  const d = new Date(dateStr + 'T00:00:00');
  if (period === 'week') {
    // ISO week
    const jan1 = new Date(d.getFullYear(), 0, 1);
    const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
  }
  if (period === 'month') return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if (period === 'year')  return `${d.getFullYear()}`;
  return dateStr;
}

// ===== FORMAT =====
function formatVal(val, metric) {
  if (val === null || val === undefined) return '—';
  const cfg = METRIC_CONFIG[metric];
  if (metric === 'rank') return `${Math.round(val)}위`;
  if (val >= 1e6) return `${cfg.prefix}${(val/1e6).toFixed(2)}M`;
  if (val >= 1e3) return `${cfg.prefix}${(val/1e3).toFixed(1)}K`;
  return `${cfg.prefix}${val.toFixed(0)}`;
}

function formatAxisVal(val, metric) {
  if (metric === 'rank') return `${Math.round(val)}`;
  const p = METRIC_CONFIG[metric].prefix;
  if (val >= 1e6) return `${p}${(val/1e6).toFixed(1)}M`;
  if (val >= 1e3) return `${p}${(val/1e3).toFixed(0)}K`;
  return `${p}${val}`;
}

function formatMoM(curr, prev, metric) {
  if (prev === null || prev === undefined || curr === null) return null;
  const isRank = metric === 'rank';
  const diff = curr - prev;
  if (diff === 0) return { text: '±0%', cls: 'neutral' };
  const pct = Math.abs(diff / prev * 100).toFixed(1);
  // For rank: lower is better, so negative diff = improvement
  const improved = isRank ? diff < 0 : diff > 0;
  const sign = diff > 0 ? '▲' : '▼';
  return { text: `${sign}${pct}%`, cls: improved ? 'up' : 'down' };
}

function formatLabelDate(label) {
  if (currentPeriod === 'day') {
    const d = new Date(label + 'T00:00:00');
    return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
  }
  if (currentPeriod === 'week') return `주: ${label}`;
  if (currentPeriod === 'month') {
    const [y,m] = label.split('-');
    return `${y}년 ${parseInt(m)}월`;
  }
  return `${label}년`;
}

// ===== PEAK FINDER =====
function findPeak(values, metric) {
  if (!values || values.length === 0) return -1;
  const nonNull = values.map((v,i)=>({v,i})).filter(x=>x.v !== null && x.v !== undefined);
  if (!nonNull.length) return -1;
  if (metric === 'rank') {
    return nonNull.reduce((best, cur) => cur.v < best.v ? cur : best).i;
  }
  return nonNull.reduce((best, cur) => cur.v > best.v ? cur : best).i;
}

// ===== CHART =====
// Custom plugin: peak annotations
const peakPlugin = {
  id: 'peakPlugin',
  afterDraw(chart) {
    const { ctx, scales: { x, y }, data } = chart;
    data.datasets.forEach((ds, di) => {
      if (ds.hidden || !ds._peakIdx === undefined) return;
      const pi = ds._peakIdx;
      if (pi < 0 || pi === undefined) return;
      const val = ds.data[pi];
      if (val === null || val === undefined) return;

      const xPos = x.getPixelForValue(pi);
      const yPos = y.getPixelForValue(val);

      // Dashed vertical line from top to point
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = ds.borderColor + 'aa';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(xPos, y.top);
      ctx.lineTo(xPos, yPos);
      ctx.stroke();
      ctx.setLineDash([]);

      // Star shape — drawn AT the data point on the line
      const cx = xPos, cy = yPos;
      const outerR = 7, innerR = 3, spikes = 5;
      ctx.beginPath();
      for (let s = 0; s < spikes * 2; s++) {
        const angle = (s * Math.PI / spikes) - Math.PI / 2;
        const r = s % 2 === 0 ? outerR : innerR;
        const sx = cx + Math.cos(angle) * r;
        const sy = cy + Math.sin(angle) * r;
        s === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
      }
      ctx.closePath();
      // White border stroke first
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
      ctx.stroke();
      // Fill with game color + glow
      ctx.fillStyle = ds.borderColor;
      ctx.shadowColor = ds.borderColor;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    });
  }
};

Chart.register(peakPlugin);

function buildChart() {
  const agg = aggregateData(currentMetric, currentPeriod);
  lastAgg = agg;

  const allDates = [...new Set(GAMES.flatMap(g => agg[g.key]?.dates || []))].sort();
  lastLabels = allDates;

  const datasets = GAMES.map((g, gi) => {
    const gdata = agg[g.key] || { dates: [], values: [] };
    const dateMap = {};
    gdata.dates.forEach((d,i) => dateMap[d] = gdata.values[i]);
    const vals = allDates.map(d => dateMap[d] !== undefined ? dateMap[d] : null);

    const peakIdx = findPeak(vals, currentMetric);

    const ds = {
      label: g.label,
      data: vals,
      borderColor: g.color,
      backgroundColor: g.bold ? `${g.color}12` : 'transparent',
      borderWidth: g.bold ? 3.5 : 1.8,
      pointRadius: 0,
      pointHoverRadius: g.bold ? 7 : 5,
      pointHoverBackgroundColor: g.color,
      pointHoverBorderColor: '#0a0d14',
      pointHoverBorderWidth: 2,
      tension: 0.35,
      fill: g.bold,
      spanGaps: true,
      hidden: hiddenGames.has(g.key),
      order: g.bold ? 0 : 1,
      _peakIdx: peakIdx,
    };
    return ds;
  });

  const canvas = document.getElementById('mainChart');
  const ctx = canvas.getContext('2d');
  if (chart) chart.destroy();

  // tick count based on visible data length
  const ticksLimit = Math.max(8, Math.min(24, Math.floor(allDates.length / 4)));

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: allDates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 350 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      onHover: (evt, elements, ch) => {
        if (!elements.length) { hideHoverPanel(); return; }
        const idx = elements[0].index;
        showHoverPanel(idx, ch);
      },
      scales: {
        x: {
          grid: { color: 'rgba(30,40,64,0.6)', drawTicks: false },
          border: { display: false },
          ticks: {
            color: '#4a5a7a',
            font: { family: 'Noto Sans KR', size: 10 },
            maxTicksLimit: ticksLimit,
            maxRotation: 0,
            autoSkip: true,
            callback(val, i) {
              const label = this.getLabelForValue(val);
              if (!label) return '';
              if (currentPeriod === 'month') {
                const [y,m] = label.split('-');
                return `${y}.${m}`;
              }
              if (currentPeriod === 'year') return label;
              if (currentPeriod === 'week') return label.replace('-W', 'W');
              // daily: M.D (no leading zeros)
              const parts = label.split('-');
              return `${parseInt(parts[1])}.${parseInt(parts[2])}`;
            }
          }
        },
        y: {
          reverse: METRIC_CONFIG[currentMetric].invert,
          grid: { color: 'rgba(30,40,64,0.6)', drawTicks: false },
          border: { display: false },
          ticks: {
            color: '#4a5a7a',
            font: { family: 'Noto Sans KR', size: 10 },
            maxTicksLimit: 8,
            callback(v) { return formatAxisVal(v, currentMetric); }
          }
        }
      }
    }
  });
}

// ===== HOVER PANEL =====
function showHoverPanel(idx, ch) {
  hoverIdx = idx;
  const label = lastLabels[idx];
  if (!label) return;

  document.getElementById('hoverDate').textContent = formatLabelDate(label);

  const rows = GAMES.map((g, gi) => {
    if (hiddenGames.has(g.key)) return '';
    const agg = lastAgg[g.key];
    const dateMap = {};
    agg.dates.forEach((d,i) => dateMap[d] = agg.values[i]);
    const allDates = lastLabels;

    const curr = dateMap[label];
    // previous period
    const prevLabel = allDates[idx - 1];
    const prev = prevLabel ? dateMap[prevLabel] : undefined;

    if (curr === undefined || curr === null) return '';

    const mom = formatMoM(curr, prev, currentMetric);
    const momHtml = mom
      ? `<span class="hover-mom ${mom.cls}">${mom.text}</span>`
      : '';

    return `<div class="hover-row">
      <div class="hover-game">
        <div class="hover-dot" style="background:${g.color}"></div>
        <span>${g.label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="hover-val">${formatVal(curr, currentMetric)}</span>
        ${momHtml}
      </div>
    </div>`;
  }).join('');

  document.getElementById('hoverRows').innerHTML = rows;
  document.getElementById('hoverPanel').classList.add('visible');
}

function hideHoverPanel() {
  document.getElementById('hoverPanel').classList.remove('visible');
  hoverIdx = -1;
}

// ===== STATS CARDS =====
function buildStats() {
  const agg = aggregateData(currentMetric, currentPeriod);
  const container = document.getElementById('statsRow');
  const clsMap = {
    '和平精英': 'stat-card highlighted heping',
    '王者荣耀': 'stat-card wangzhe',
    '三角洲行动': 'stat-card delta',
    '无畏契约：源能行动': 'stat-card wuwei',
  };
  const periodLabel = { day: '최신 일', week: '최신 주', month: '최신 월', year: '최신 연' }[currentPeriod];

  container.innerHTML = GAMES.map(g => {
    const data = agg[g.key];
    const n = data.values.length;
    const lastVal = n ? data.values[n - 1] : null;
    const prevVal = n >= 2 ? data.values[n - 2] : null;
    const mom = formatMoM(lastVal, prevVal, currentMetric);

    // Peak
    const peakIdx = findPeak(data.values, currentMetric);
    const peakVal = peakIdx >= 0 ? data.values[peakIdx] : null;
    const peakDate = peakIdx >= 0 ? data.dates[peakIdx] : null;
    const peakDateStr = peakDate ? formatLabelDate(peakDate) : '—';

    const momHtml = mom
      ? `<span class="stat-mom ${mom.cls}">${mom.text}</span>`
      : '';
    const peakHtml = peakVal !== null
      ? `<div class="stat-peak">⭐ 최고치 <span>${formatVal(peakVal, currentMetric)}</span> · ${peakDateStr}</div>`
      : '';

    return `<div class="${clsMap[g.key] || 'stat-card'}">
      <div class="stat-game">${g.label}</div>
      <div class="stat-main">
        <div class="stat-value">${lastVal !== null ? formatVal(lastVal, currentMetric) : '—'}</div>
        ${momHtml}
      </div>
      <div class="stat-label">${periodLabel} · ${METRIC_CONFIG[currentMetric].title.split('(')[0].split('（')[0]}</div>
      ${peakHtml}
    </div>`;
  }).join('');
}

// ===== LEGEND =====
function buildLegend() {
  const container = document.getElementById('legend');
  container.innerHTML = GAMES.map(g => {
    const isH = g.key === '和平精英';
    const dimmed = hiddenGames.has(g.key) ? ' dimmed' : '';
    return `<div class="legend-item${isH ? ' heping' : ''}${dimmed}" onclick="toggleGame('${g.key}')">
      <div class="legend-line${isH ? ' bold' : ''}" style="background:${g.color}"></div>
      <span class="legend-label">${g.label}</span>
    </div>`;
  }).join('');
}

// ===== CONTROLS =====
function setMetric(m) {
  currentMetric = m;
  document.querySelectorAll('.metric-tab').forEach((el, i) => {
    el.classList.toggle('active', ['rank','revenue','dau'][i] === m);
  });
  document.getElementById('chartTitle').textContent = METRIC_CONFIG[m].title;
  refresh();
}

function setPeriod(p) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach((el, i) => {
    el.classList.toggle('active', ['day','week','month','year'][i] === p);
  });
  refresh();
}

function toggleGame(key) {
  if (hiddenGames.has(key)) hiddenGames.delete(key);
  else hiddenGames.add(key);
  buildLegend();
  buildChart();
}

function onDateChange() {
  filterFrom = document.getElementById('dateFrom').value;
  filterTo   = document.getElementById('dateTo').value;
  if (filterFrom > filterTo) return;
  updateHeaderSub();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  refresh();
}

function setPreset(from, to, label) {
  filterFrom = from;
  filterTo = to;
  document.getElementById('dateFrom').value = from;
  document.getElementById('dateTo').value = to;
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === label || b.textContent.trim().startsWith(label));
  });
  updateHeaderSub();
  refresh();
}

function updateHeaderSub() {
  const f = filterFrom.replace(/-/g,'.');
  const t = filterTo.replace(/-/g,'.');
  document.getElementById('headerSub').textContent = `iOS · ${f} — ${t} · 출처：Sensor Tower`;
}

function refresh() {
  buildStats();
  buildChart();
  buildLegend();
}

// ===== INIT =====
refresh();
</script>
</body>
